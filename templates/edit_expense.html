{% extends 'base.html' %}
{% block title %}Edit Expense{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">✏️ Edit Expense</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Category:</label>
                        <select name="category" class="form-select" required>
                            {% for cat in categories %}
                            <option value="{{ cat.name }}" {% if cat.name == expense.category %}selected{% endif %}>
                                {{ cat.icon }} {{ cat.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Amount (₹):</label>
                        <input type="number" name="amount" class="form-control" 
                               value="{{ expense.amount }}" 
                               required min="1" step="0.01">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Note (Optional):</label>
                        <input type="text" name="note" class="form-control" 
                               value="{{ expense.note or '' }}" 
                               placeholder="e.g., Lunch with Sarah" maxlength="100">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Date:</label>
                        <input type="date" name="date" class="form-control" 
                               value="{{ expense.date.strftime('%Y-%m-%d') }}" 
                               required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning btn-lg text-dark fw-bold">
                            💾 Update Expense
                        </button>
                        <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary">
                            ← Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
