{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">🔒 Change Password</h4>
            </div>
            <div class="card-body">
                <form method="POST" aria-label="Change password form">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Current Password:</label>
                        <input type="password" name="old_password" class="form-control" 
                               placeholder="Enter your current password" required autofocus
                               aria-label="Current password" aria-required="true">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">New Password:</label>
                        <input type="password" name="new_password" class="form-control" 
                               placeholder="Enter new password (min 6 characters)" required minlength="6"
                               aria-label="New password" aria-required="true">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Confirm New Password:</label>
                        <input type="password" name="confirm_password" class="form-control" 
                               placeholder="Re-enter new password" required
                               aria-label="Confirm new password" aria-required="true">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">💾 Update Password</button>
                        <a href="{{ url_for('profile') }}" class="btn btn-secondary">← Back to Profile</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
